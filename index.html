    // --- Helper Functions ---
    function formatNumber(num) {
      return Number(num).toLocaleString('th-TH');
    }

    function getTopRankings(cases) {
      const uniqueTopValues = [...new Set(cases)].filter(val => val > 0).sort((a, b) => b - a).slice(0, 3);
      const rankings = {};
      cases.forEach((val, idx) => {
        if (val > 0) {
          const rank = uniqueTopValues.indexOf(val);
          if (rank !== -1) rankings[idx] = rank + 1;
        }
      });
      return rankings;
    }

    // สร้างกราฟแท่งจิ๋วในตาราง (HTML CSS)
    function createMiniBar(data, trend) {
      if (!data || data.length === 0) return '';
      const max = Math.max(...data, 1);
      const colorClass = trend === 'up' ? 'bg-rose-500' : (trend === 'down' ? 'bg-emerald-500' : 'bg-amber-500');
      
      let html = `<div class="flex items-end gap-[2px] h-8 w-16 justify-center">`;
      data.forEach(val => {
        const heightPct = (val / max) * 100;
        html += `<div class="${colorClass} mini-bar w-1.5 opacity-60 hover:opacity-100" style="height: ${heightPct}%" title="${val}"></div>`;
      });
      html += `</div>`;
      return html;
    }

          iconBg: "from-fuchsia-500 to-pink-500", iconShadow: "shadow-[0_0_25px_rgba(217,70,239,0.6)]",
          titleColor: "text-fuchsia-300",
          trendText: "ติดตามใกล้ชิด", trendIcon: "👁️", trendColor: "text-fuchsia-400", trendSuffix: "", isHtml: true, isPulse: true
        }
      ];

      let html = '';
      cards.forEach(c => {
        let valHTML = c.isHtml ? c.val : c.val;
        let trendHTML = '';
        if(c.trendText !== undefined && c.trendText !== '') {
            trendHTML = `<div class="mt-6 flex items-center text-sm bg-black/20 backdrop-blur-md px-3.5 py-2 rounded-xl border border-white/5 shadow-inner">
              <span class="${c.trendColor} font-bold mr-2 text-lg drop-shadow-md">${c.trendIcon}</span>
              <span class="${c.trendColor} font-bold ${c.isHtml ? 'truncate' : ''} drop-shadow-md">${c.trendText}</span>
              <span class="text-stone-400 ml-2 font-medium">${c.trendSuffix}</span>
            </div>`;
        }

        html += `
          <div class="relative rounded-3xl p-6 shadow-[0_10px_30px_rgba(0,0,0,0.4)] border ${c.borderClass} overflow-hidden group hover:-translate-y-2 transition-all duration-300 bg-[#0f172a] bg-gradient-to-br ${c.bgClass}">
            ${c.isPulse ? '<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-fuchsia-500/10 to-transparent z-0 animate-pulse pointer-events-none"></div>' : ''}
            
            <div class="flex justify-between items-start relative z-10">
              <div class="pr-2">
                <p class="${c.titleColor} text-[13px] font-bold mb-2 uppercase tracking-wide drop-shadow-md">${c.title}</p>
                <h2 class="text-4xl font-black text-white tracking-tight drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">${valHTML}</h2>
              </div>
              
              <!-- Icon Badge with glowing effect -->
              <div class="flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br ${c.iconBg} ${c.iconShadow} border border-white/30 group-hover:scale-110 group-hover:rotate-3 transition-transform shrink-0">
                <span class="text-2xl drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)]">${c.icon}</span>
              </div>
            </div>
            ${trendHTML}
          </div>
        `;
      });
      kpiContainer.innerHTML = html;
    }

    function generateTableHTML(title, data, titleColor) {
      if (!data || data.length === 0) return '';
      
      let html = `
        <div class="t-card border t-border rounded-2xl shadow-2xl overflow-hidden flex flex-col w-full mb-14">
          <table class="text-left border-collapse w-full">
            <thead class="relative z-20">
              <tr class="t-header text-[14px] tracking-wider shadow-md">
                <th class="p-5 font-black border-b-2 border-r t-border min-w-[240px] ${titleColor} text-[18px] align-bottom">${title}</th>
                <th class="p-5 font-bold border-b-2 border-r t-border text-center min-w-[70px] text-blue-300 align-bottom">สะสม<br/><span class="text-[11px] opacity-80 font-medium">YTD</span></th>
                <th class="p-5 font-bold border-b-2 border-r t-border text-center min-w-[60px] text-rose-300 align-bottom t-bg-subtle-rose">ตาย<br/><span class="text-[11px] opacity-80 font-medium">YTD</span></th>
                <th class="p-5 font-bold border-b-2 border-r t-border text-center text-emerald-300 min-w-[150px] align-bottom t-bg-subtle-blue">สัปดาห์นี้<br/><span class="text-[11px] opacity-80 font-medium">This Week Trend</span></th>
      `;
      
      districts.forEach(dist => {
        html += `<th class="px-0 py-5 font-bold border-b-2 t-border text-center w-[60px] min-w-[60px] max-w-[60px] t-text align-bottom text-[12px] leading-tight" style="word-break: normal; overflow-wrap: normal;">${dist}</th>`;
      });
      
      html += `</tr></thead><tbody>`;
      
      data.forEach(row => {
        const rankings = getTopRankings(row.cases);
        const trendColor = row.trend === 'up' ? 'text-rose-500' : (row.trend === 'down' ? 'text-emerald-500' : 'text-amber-500');
        
        html += `<tr class="t-hover transition-colors group">`;
        html += `
          <td class="p-4 font-medium t-text border-r t-border whitespace-nowrap t-card">
            <div class="flex items-center space-x-3">
              <span class="flex items-center justify-center w-6 h-6 rounded-full t-badge t-text-muted text-xs font-bold border t-border">${row.id}</span>
              <span class="text-[16px]">${row.name}</span>
            </div>
          </td>
          <td class="p-4 text-center t-text-muted border-r t-border font-medium text-[16px]">${formatNumber(row.ytdCases)}</td>
          <td class="p-4 text-center border-r t-border t-bg-subtle-rose">
            <span class="font-bold text-[16px] ${row.ytdDeaths > 0 ? 'text-rose-500 bg-rose-500/10 border border-rose-500/20 px-2 py-1 rounded-md shadow-sm' : 't-text-muted opacity-60'}">${row.ytdDeaths > 0 ? row.ytdDeaths : '-'}</span>
          </td>
          <td class="p-3 border-r t-border t-bg-subtle-blue">
            <div class="flex items-center justify-start space-x-3 pl-2">
              <span class="font-black text-[20px] px-3 py-1.5 rounded-xl shadow-inner border-2 min-w-[3.5rem] text-center ${trendColor} bg-slate-500/10 border-slate-500/30">
                ${formatNumber(row.weeklyCases)}
              </span>
              ${createMiniBar(row.trendData, row.trend)}
            </div>
          </td>
        `;
        
        row.cases.forEach((caseCount, index) => {
          const rank = rankings[index];
          let badgeContent = `<span class="t-text-muted opacity-30 text-[13px]">-</span>`;
          
          if (rank === 1) {
            badgeContent = `<div class="mx-auto w-8 h-8 flex items-center justify-center bg-gradient-to-tr from-rose-600 to-rose-400 text-white rounded-full shadow-[0_0_10px_rgba(225,29,72,0.8)] border border-rose-200 font-black text-[15px] transform hover:scale-110 transition-transform">${caseCount}</div>`;
          } else if (rank === 2) {
            badgeContent = `<div class="mx-auto w-7 h-7 flex items-center justify-center bg-gradient-to-tr from-orange-500 to-orange-400 text-white rounded-full shadow-[0_0_6px_rgba(249,115,22,0.6)] border border-orange-200 font-bold text-[14px]">${caseCount}</div>`;
          } else if (rank === 3) {
            badgeContent = `<div class="mx-auto w-6 h-6 flex items-center justify-center bg-gradient-to-tr from-amber-400 to-amber-300 text-amber-950 rounded-lg shadow-[0_0_4px_rgba(251,191,36,0.5)] border border-amber-100 font-bold text-[12px]">${caseCount}</div>`;
          } else if (caseCount > 0) {
            badgeContent = `<span class="t-text font-medium text-[15px]">${caseCount}</span>`;
          }
          
          html += `<td class="p-1 text-center border-r t-border w-[60px] min-w-[60px] max-w-[60px] align-middle">${badgeContent}</td>`;
        });
        
        html += `</tr>`;
      });
      
      html += `</tbody></table></div>`;
      return html;
    }

    function renderTables() {
      const container = document.getElementById('tables-container');
      container.innerHTML = 
        generateTableHTML("กลุ่มโรคติดต่อที่สำคัญ", dashboardData.importantDiseases, "t-text") +
        generateTableHTML("กลุ่มโรคเฝ้าระวังเป็นพิเศษ", dashboardData.specialDiseases, "text-rose-500") +
        generateTableHTML("กลุ่มโรคกำจัด / กวาดล้าง", dashboardData.eradicationDiseases, "text-amber-500");
    }

    function renderNotes() {
      const container = document.getElementById('notes-container');
      let html = '';
      dashboardData.notes.forEach(note => {
        const dotColor = note.type === 'danger' ? 'bg-rose-500' : (note.type === 'warning' ? 'bg-amber-500' : 'bg-emerald-500');
        html += `
          <div class="flex items-start space-x-3">
            <div class="w-2 h-2 mt-2 ${dotColor} rounded-full shrink-0 shadow-[0_0_8px_var(--bg-base)]"></div>
            <p class="t-text-muted text-[16px] leading-relaxed">${note.message}</p>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    // --- Main Logic ---
    window.onload = () => {
      renderKPIs();
      renderTables();
      renderNotes();

      // อัปเดตสัปดาห์เมื่อพิมพ์ตัวเลข
      document.getElementById('week-input').addEventListener('input', (e) => {
        document.getElementById('header-week').innerText = e.target.value;
      });
    };

  </script>
</body>
</html>
